<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="LY管理">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="manifest" href="manifest.json">
  <title>LY-Core-Backend</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #1a1a2e;
      display: flex; align-items: center; justify-content: center;
      font-family: sans-serif; color: #fff;
    }
    .spinner {
      text-align: center;
    }
    .spinner::before {
      content: '';
      display: block;
      width: 40px; height: 40px;
      border: 3px solid #e94560;
      border-top-color: transparent;
      border-radius: 50%;
      margin: 0 auto 12px;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="spinner">起動中...</div>
  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbxR2gSajpM1MX_m6NHKBpuEK492KWLufEqlwhPjWV1Bz02oi3oEzSa62YjuBC6tAjRXTw/exec';
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(console.error);
    }
    window.location.replace(GAS_URL);
  </script>
</body>
</html>
