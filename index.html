<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="LY管理">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="manifest" href="manifest.json">
  <title>LY-Core-Backend</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; }
    iframe { width: 100%; height: 100%; border: none; display: block; }
    #loading { position: fixed; inset: 0; display: flex; align-items: center;
      justify-content: center; background: #1a1a2e; color: #fff;
      font-family: sans-serif; font-size: 14px; z-index: 10; }
  </style>
</head>
<body>
  <div id="loading">読み込み中...</div>
  <iframe id="app"
    src="https://script.google.com/macros/s/AKfycbxR2gSajpM1MX_m6NHKBpuEK492KWLufEqlwhPjWV1Bz02oi3oEzSa62YjuBC6tAjRXTw/exec"
    allow="fullscreen" title="LY-Core-Backend"
    onload="document.getElementById('loading').style.display='none'">
  </iframe>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(console.error);
      });
    }
  </script>
</body>
</html>
